<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TEMU 运营看板</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1 id="pageTitle">TEMU 运营看板</h1>
        <div id="updateStatus" class="update-status">读取数据中</div>
        <p id="sourceLine">读取数据中</p>
      </div>
      <div class="top-actions">
        <a id="priceNav" class="nav-link" href="/price">价格同步</a>
        <a id="inventoryNav" class="nav-link" href="/inventory">库存上下架</a>
        <a id="returnLabelNav" class="nav-link" href="/api/return-label/open" target="_blank" rel="noreferrer">退货面单</a>
        <button id="operatorBtn" type="button" class="secondary operator-button">操作人：未设置</button>
        <button id="operationLogBtn" type="button" class="secondary">操作记录</button>
        <button id="refreshBtn" type="button">刷新数据</button>
        <button id="runFetchBtn" type="button">同步更新领星+库存</button>
        <button id="runInventoryBtn" type="button">仅刷新库存</button>
        <button id="exportBtn" type="button" class="secondary">导出当前筛选</button>
      </div>
    </header>

    <main>
      <section id="metricGrid" class="metrics" aria-label="汇总指标"></section>

      <section class="filters" aria-label="筛选">
        <div class="quick-search">
          <input id="searchInput" type="search" placeholder="搜索 SPU / SKC / SKU / 标题 / 负责人 / 店铺" />
          <button id="clearFiltersBtn" type="button" class="secondary">清空筛选</button>
          <span id="resultCount" class="result-count">0 / 0</span>
        </div>
        <div id="filterGrid" class="filter-grid"></div>
      </section>

      <section class="batch-toolbar" aria-label="批量操作">
        <span id="selectionCount" class="selection-count">已选 0</span>
        <button id="bulkClaimBtn" type="button" class="secondary">批量认领</button>
        <button id="bulkNoteBtn" type="button" class="secondary">批量备注</button>
        <button id="bulkDoneBtn" type="button" class="secondary">批量已完成</button>
        <button id="bulkAbandonBtn" type="button" class="secondary danger-action">批量弃用</button>
        <button id="clearSelectionBtn" type="button" class="secondary">清空选择</button>
      </section>

      <section class="table-shell">
        <table>
          <thead id="tableHead"></thead>
          <tbody id="tableBody">
            <tr>
              <td class="empty">读取数据中</td>
            </tr>
          </tbody>
        </table>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
